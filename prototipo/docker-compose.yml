services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: studylink
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - studylink-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=studylink;Username=user;Password=password
      - Jwt__Key=SuperSecretKeyForStudyLinkApp123456789!
      - Jwt__Issuer=StudyLink
      - Jwt__Audience=StudyLink
    depends_on:
      - db
    volumes:
      - uploads_data:/app/wwwroot/uploads
    networks:
      - studylink-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=
    depends_on:
      - backend
    networks:
      - studylink-network

volumes:
  db_data:
  uploads_data:

networks:
  studylink-network:
    driver: bridge
